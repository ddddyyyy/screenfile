name: Build Binaries

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: screenfile-linux-x64.zip
            executable_path: dist/screenfile
          - os: macos-latest
            artifact_name: screenfile-macos.zip
            executable_path: dist/screenfile
          - os: windows-latest
            artifact_name: screenfile-windows-x64.zip
            executable_path: dist/screenfile.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with build extras
        run: python -m pip install -e ".[build]"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Build executable
        run: python scripts/build_executable.py

      - name: Package executable
        run: python scripts/package_artifact.py "${{ matrix.executable_path }}" "dist/${{ matrix.artifact_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error
