name: Release Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: screenfile-linux-x64.zip
            executable_path: dist/screenfile
          - os: macos-latest
            asset_name: screenfile-macos.zip
            executable_path: dist/screenfile
          - os: windows-latest
            asset_name: screenfile-windows-x64.zip
            executable_path: dist/screenfile.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with build extras
        run: python -m pip install -e ".[build]"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Build executable
        run: python scripts/build_executable.py

      - name: Package executable
        run: python scripts/package_artifact.py "${{ matrix.executable_path }}" "dist/${{ matrix.asset_name }}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/screenfile-linux-x64.zip
            dist/screenfile-macos.zip
            dist/screenfile-windows-x64.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
