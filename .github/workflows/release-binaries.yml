name: Release Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os_name }}-${{ matrix.cpu_arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os_name: linux
            cpu_arch: x64
            executable_path: dist/screenfile
          - os: macos-latest
            os_name: macos
            cpu_arch: arm64
            executable_path: dist/screenfile
          - os: windows-latest
            os_name: windows
            cpu_arch: x64
            executable_path: dist/screenfile.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with build extras
        run: python -m pip install -e ".[build]"

      - name: Resolve asset name
        shell: bash
        run: |
          asset_name="screenfile-${GITHUB_REF_NAME}-${{ matrix.os_name }}-${{ matrix.cpu_arch }}.zip"
          echo "ASSET_NAME=${asset_name}" >> "$GITHUB_ENV"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Build executable
        run: python scripts/build_executable.py

      - name: Package executable
        run: python scripts/package_artifact.py "${{ matrix.executable_path }}" "dist/${{ env.ASSET_NAME }}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: dist/${{ env.ASSET_NAME }}
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Build release notes from tag annotation
        shell: bash
        run: |
          git fetch --tags --force
          notes="$(git for-each-ref --format='%(contents)' "refs/tags/${GITHUB_REF_NAME}")"
          if [ -z "$notes" ]; then
            notes="Release ${GITHUB_REF_NAME}"
          fi
          printf '%s\n' "$notes" > release-notes.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/screenfile-*.zip
          fail_on_unmatched_files: true
          body_path: release-notes.md
